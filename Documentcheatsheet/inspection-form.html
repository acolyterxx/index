<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="農業部畜產試驗所作業巡檢表 - 線上填寫版">
  <title>作業巡檢表 | 農業部畜產試驗所</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .form-container { max-width: 1180px; }
    .form-header { padding: 22px 24px; margin-bottom: 16px; }
    .form-title-main { font-size: clamp(26px, 3.4vw, 42px); line-height: 1.15; }
    .compact-section { padding: 18px; margin-bottom: 14px; }
    .type-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
    .type-card {
      min-height: 88px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.035); color: var(--text-secondary); text-align: left; cursor: pointer;
      transition: border-color .2s ease, background .2s ease, transform .2s ease; font-family: var(--font-sans);
    }
    .type-card:hover, .type-card.active { border-color: #60a5fa; background: rgba(59,130,246,0.12); transform: translateY(-2px); }
    .type-card strong { display: block; color: var(--text-primary); font-size: 14px; line-height: 1.35; margin-bottom: 6px; }
    .type-card span { display: block; font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .form-note {
      margin-top: 10px; padding: 10px 12px; border: 1px solid rgba(96,165,250,0.24); border-radius: var(--radius-sm);
      color: var(--text-secondary); background: rgba(59,130,246,0.06); font-size: 12px; line-height: 1.55;
    }
    .basic-grid { display: grid; grid-template-columns: 1fr 1fr 1.25fr; gap: 14px; align-items: end; }
    .calendar-panel { margin-top: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: rgba(255,255,255,0.025); }
    .calendar-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px;
      background: rgba(59,130,246,0.12); border-bottom: 1px solid var(--border);
    }
    .calendar-title { color: var(--text-primary); font-weight: 800; font-size: 15px; }
    .calendar-legend { display: flex; gap: 12px; color: var(--text-muted); font-size: 12px; flex-wrap: wrap; }
    .calendar-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
    .legend-selected { background: #60a5fa; }
    .legend-locked { background: #f9a8d4; }
    .month-calendar { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
    .month-calendar th {
      padding: 7px 4px; color: #93c5fd; background: rgba(255,255,255,0.04); border: 1px solid var(--border); font-weight: 700;
    }
    .month-calendar td { height: 48px; padding: 0; border: 1px solid var(--border); vertical-align: top; background: rgba(255,255,255,0.025); }
    .calendar-day {
      width: 100%; height: 48px; border: 0; background: transparent; color: var(--text-secondary); font: inherit;
      cursor: pointer; display: grid; grid-template-rows: auto 1fr; align-items: start; justify-items: start;
      padding: 5px 6px; text-align: left;
    }
    .calendar-day:hover:not(:disabled) { background: rgba(96,165,250,0.14); }
    .calendar-day.selected { background: rgba(96,165,250,0.28); color: var(--text-primary); box-shadow: inset 0 0 0 2px rgba(96,165,250,0.85); }
    .calendar-day.active { box-shadow: inset 0 0 0 2px rgba(96,165,250,0.95), 0 0 0 2px rgba(255,255,255,0.45); }
    .calendar-day.locked { background: rgba(249,168,212,0.16); color: #f9a8d4; cursor: not-allowed; }
    .calendar-day.blank { cursor: default; background: rgba(255,255,255,0.01); }
    .day-num { font-weight: 800; font-size: 13px; line-height: 1; }
    .day-note { align-self: end; font-size: 10px; color: var(--text-muted); line-height: 1.2; margin-top: 4px; }
    .calendar-day.locked .day-note { color: #f9a8d4; }
    .selected-dates { padding: 9px 12px; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; line-height: 1.5; min-height: 36px; }
    .inspect-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 12px; margin-top: 10px; }
    .inspect-table th {
      background: rgba(59,130,246,0.15); color: #93c5fd; font-weight: 700; padding: 8px 10px;
      text-align: center; border: 1px solid var(--border); line-height: 1.35;
    }
    .inspect-table td { padding: 7px 9px; border: 1px solid var(--border); color: var(--text-secondary); vertical-align: middle; line-height: 1.45; }
    .inspect-table tr:hover td { background: rgba(59,130,246,0.04); }
    .part-col { width: 18%; color: var(--text-primary); font-weight: 600; text-align: center; }
    .content-col { width: 52%; }
    .result-col { width: 30%; }
    .improvement-box { min-height: 92px; resize: vertical; }
    .radio-group { display: grid; grid-template-columns: repeat(4, max-content); gap: 8px; justify-content: center; align-items: center; }
    .radio-group label {
      display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); cursor: pointer; white-space: nowrap;
    }
    .radio-group input[type="radio"] { accent-color: var(--primary-light); cursor: pointer; width: 13px; height: 13px; }
    .stat-ok { color: #4ade80; }
    .stat-maintain { color: #fbbf24; }
    .stat-fail { color: #f87171; }
    .stat-na { color: #94a3b8; }
    .signature-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 10px; }
    .signature-box { border: 1px solid var(--border); border-radius: var(--radius-sm); background: rgba(255,255,255,0.035); overflow: hidden; }
    .signature-title { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text-primary); font-weight: 700; font-size: 13px; text-align: center; }
    .signature-pad { display: block; width: 100%; height: 112px; background: rgba(255,255,255,0.96); touch-action: none; cursor: crosshair; }
    .signature-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 7px 9px; color: var(--text-muted); font-size: 11px; }
    .signature-clear {
      border: 1px solid var(--border); border-radius: 6px; background: rgba(255,255,255,0.04); color: var(--text-secondary);
      padding: 4px 8px; font: inherit; cursor: pointer;
    }
    .signature-clear:hover { border-color: #60a5fa; color: var(--text-primary); }
    .print-sheet { display: none; }

    @media (max-width: 960px) {
      .type-grid, .signature-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .basic-grid { grid-template-columns: 1fr; }
      .radio-group { grid-template-columns: repeat(2, max-content); }
    }
    @media (max-width: 560px) {
      .type-grid, .signature-grid { grid-template-columns: 1fr; }
      .inspect-table { font-size: 11px; }
      .radio-group { justify-content: start; }
    }
    @media print {
      @page { size: A4 landscape; margin: 10mm 7mm; }
      html, body {
        width: 283mm; min-height: 0; margin: 0 !important; padding: 0 !important;
        background: #fff !important; color: #000 !important; overflow: visible !important;
      }
      body > *:not(.print-sheet) { display: none !important; }
      .print-sheet, .print-sheet * { visibility: visible !important; }
      .print-sheet {
        display: block !important; position: relative; width: 283mm; max-width: 283mm; min-height: 0;
        margin: 0 !important; padding: 0; color: #000 !important; box-sizing: border-box;
        font-family: "標楷體", "DFKai-SB", "BiauKai", serif; font-size: 14pt; font-weight: 400 !important;
        overflow: visible !important; break-after: avoid; page-break-after: avoid;
      }
      .print-sheet * { box-sizing: border-box; font-family: "標楷體", "DFKai-SB", "BiauKai", serif; font-weight: 400 !important; }
      .print-num { font-family: "Times New Roman", Times, serif !important; font-weight: 400 !important; }
      .print-retention {
        position: absolute; top: 0; right: 0; border: 1px solid #000; padding: 2px 7px;
        font-size: 14pt; line-height: 1.2; background: #fff !important;
      }
      .print-title-org { text-align: center; font-size: 20pt; line-height: 1.35; padding-top: 1mm; }
      .print-title-main { text-align: center; font-size: 20pt; line-height: 1.35; margin-top: 0; padding-bottom: 1mm; }
      .print-meta {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin: 4px 0 4px; font-size: 14pt; line-height: 1.65;
        width: 100%;
      }
      .print-meta div { text-align: left; padding: 1px 8px 2px 0; }
      .print-meta div:nth-child(2) { text-align: center; padding-left: 4px; padding-right: 4px; }
      .print-meta div:nth-child(3) { text-align: right; padding-left: 8px; padding-right: 0; }
      .print-table {
        width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 12pt; line-height: 1.12; page-break-inside: auto;
      }
      .print-table thead { display: table-header-group; }
      .print-table tfoot { display: table-footer-group; }
      .print-table th, .print-table td {
        border: 1px solid #000; padding: 2.2px 1.8px; color: #000 !important; background: #fff !important;
        vertical-align: middle; text-align: center; overflow-wrap: anywhere;
      }
      .print-table thead th { background: #e6e6e6 !important; }
      .print-table tr { break-inside: avoid; page-break-inside: avoid; }
      .print-table .print-part { width: 24mm; }
      .print-table .print-content { width: 44mm; text-align: left; }
      .print-table .print-day { width: 6.45mm; font-size: 12pt; padding: 1px; }
      .print-table .print-mark { font-size: 12pt; padding: 0; }
      .print-electric-cart .print-meta { line-height: 1.3; transform: translateY(-0.8mm); padding-bottom: 0.8mm; }
      .print-electric-cart .print-meta div { font-family: "標楷體", "DFKai-SB", "BiauKai", serif; padding-bottom: 1.2mm; }
      .print-electric-cart .print-table tbody .print-part {
        width: 39mm;
        text-align: left !important;
        white-space: normal;
        word-break: keep-all;
        overflow-wrap: anywhere;
        padding-left: 4px;
      }
      .print-electric-cart .print-table thead .print-part { width: 39mm; text-align: center !important; }
      .print-electric-cart .print-table .print-content { width: 27mm; text-align: center; }
      .print-electric-cart .print-plate-value { font-family: "Times New Roman", Times, serif !important; }
      .print-electric-cart .print-signatures { margin-top: 3px; }
      .print-electric-cart .print-sign-box { height: 16mm; grid-template-rows: 4.8mm 1fr; }
      .print-electric-cart .print-sign-title { font-size: 12pt; line-height: 4.8mm; }
      .print-protective-equipment .print-table { font-size: 11pt; line-height: 1.08; }
      .print-protective-equipment .print-table th,
      .print-protective-equipment .print-table td { padding: 1.8px 1.5px; }
      .print-protective-equipment .print-meta { line-height: 1.3; transform: translateY(-0.8mm); padding-bottom: 0.8mm; }
      .print-protective-equipment .print-meta div { font-family: "標楷體", "DFKai-SB", "BiauKai", serif; padding-bottom: 1.2mm; }
      .print-protective-equipment .print-table .print-part { width: 20mm; white-space: nowrap; word-break: keep-all; }
      .print-protective-equipment .print-table thead th { text-align: center !important; }
      .print-protective-equipment .print-table tbody .print-content {
        width: 50mm;
        text-align: left !important;
        white-space: normal;
        word-break: normal;
        overflow-wrap: anywhere;
      }
      .print-protective-equipment .print-table thead .print-content { width: 50mm; text-align: center !important; }
      .print-protective-equipment .print-content-inner {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.12;
      }
      .print-protective-equipment .print-table .print-day { width: 6.65mm; font-size: 11pt; padding: 0.6px; }
      .print-protective-equipment .print-table .print-mark { font-size: 11pt; }
      .print-protective-equipment .print-improve-row { height: 7mm; }
      .print-protective-equipment .print-improve-cell { white-space: nowrap; overflow: hidden; text-overflow: clip; line-height: 1.2; padding: 2px 5px !important; }
      .print-protective-equipment .print-note { font-size: 9.6pt; line-height: 1.02; padding: 1.5px 4px !important; }
      .print-protective-equipment .print-note-title { margin-bottom: 0; line-height: 1.02; }
      .print-protective-equipment .print-note-lines li { line-height: 1.02; }
      .print-protective-equipment .print-sign-box { height: 17mm; grid-template-rows: 5mm 1fr; }
      .print-protective-equipment .print-sign-title { font-size: 12pt; line-height: 5mm; }
      .print-electric-machinery .print-meta { line-height: 1.3; transform: translateY(-0.8mm); padding-bottom: 0.8mm; margin-bottom: 4px; }
      .print-electric-machinery .print-meta div { font-family: "標楷體", "DFKai-SB", "BiauKai", serif; padding-bottom: 1.2mm; }
      .print-electric-machinery .print-table { border-collapse: collapse; border-spacing: 0; }
      .print-electric-machinery .print-table th,
      .print-electric-machinery .print-table td { border: 1px solid #000; }
      .print-electric-machinery .print-table thead th {
        text-align: center !important;
        border: 1px solid #000;
        border-bottom: 1px solid #000 !important;
      }
      .print-electric-machinery .print-table th:first-child,
      .print-electric-machinery .print-table td:first-child { border-left: 1px solid #000; }
      .print-electric-machinery .print-table tr:last-child td { border-bottom: 1px solid #000; }
      .print-electric-machinery .print-table {
        outline: none;
      }
      .print-electric-machinery .print-table-continued {
        break-before: page;
        page-break-before: always;
        margin-top: 0;
      }
      .print-electric-machinery .print-part {
        text-align: center !important;
        vertical-align: middle !important;
        display: table-cell;
        line-height: 1.25;
      }
      .print-monthly-workplace .print-meta { line-height: 1.3; transform: translateY(-0.8mm); padding-bottom: 0.8mm; margin-bottom: 4px; }
      .print-monthly-workplace .print-meta div { font-family: "標楷體", "DFKai-SB", "BiauKai", serif; padding-bottom: 1.2mm; }
      .print-monthly-workplace .print-table thead th { text-align: center !important; }
      .print-monthly-workplace .print-table .print-part { width: 28mm; white-space: normal; word-break: keep-all; }
      .print-monthly-workplace .print-table .print-content {
        width: 171mm;
        text-align: left;
        word-break: keep-all;
        line-height: 1.15;
      }
      .print-monthly-workplace .print-content-inner {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .print-monthly-workplace .print-table .print-day { width: 6.9mm; font-size: 12pt; }
      .print-improve-row { height: 12mm; }
      .print-improve-cell { text-align: left !important; vertical-align: top !important; white-space: pre-wrap; line-height: 1.35; padding: 3px 5px !important; }
      .print-note { text-align: left !important; vertical-align: top !important; font-size: 11pt; line-height: 1.32; padding: 3px 5px !important; overflow: hidden; }
      .print-note-title { margin-bottom: 1px; }
      .print-note-lines { margin: 0; padding-left: 0; list-style: none; }
      .print-note-lines li { margin: 0; padding: 0; line-height: 1.32; }
      .print-signatures {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 5px; border: 1px solid #000; border-right: 0; break-inside: avoid;
        break-after: avoid;
        page-break-after: avoid;
      }
      .print-sign-box { border-right: 1px solid #000; height: 20mm; display: grid; grid-template-rows: 5.5mm 1fr; }
      .print-sign-title { text-align: center; border-bottom: 1px solid #000; font-size: 14pt; line-height: 5.5mm; }
      .print-sign-body { display: flex; align-items: center; justify-content: center; }
      .print-sign-body img { max-width: 95%; max-height: 13mm; }
      .print-signatures + * { display: none !important; }
    }
  </style>
</head>
<body class="form-page">
  <div class="bg-animation">
    <div class="orb orb-1" style="background:radial-gradient(circle,#1e40af,transparent)"></div>
    <div class="orb orb-2" style="background:radial-gradient(circle,#1a6b3c,transparent)"></div>
  </div>

  <nav class="form-topbar">
    <a href="index.html" class="back-btn">← 返回首頁</a>
    <span class="topbar-title">作業巡檢表</span>
    <div class="topbar-actions">
      <button class="btn btn-ghost" onclick="clearForm()">清除</button>
      <button class="btn btn-print" onclick="printForm()">列印/匯出PDF檔</button>
      <button class="btn btn-primary" onclick="saveForm()">暫存</button>
    </div>
  </nav>

  <div class="form-container">
    <div class="form-header" style="border-color: rgba(59,130,246,0.3);">
      <div class="form-org">農業部畜產試驗所</div>
      <h1 class="form-title-main"><span id="current-title">作業巡檢表</span></h1>
      <p class="form-subtitle" id="current-subtitle">請選擇表單類型</p>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%; background: linear-gradient(90deg, #60a5fa, #3b82f6);"></div>
    </div>

    <div class="form-section compact-section">
      <div class="section-title" style="color:#60a5fa;">
        <span class="section-num" style="background:#3b82f6;">1</span>
        選擇表單類型
      </div>
      <div class="type-grid" id="type-grid"></div>
      <div class="form-note" id="form-note"></div>
    </div>

    <div class="form-section compact-section">
      <div class="section-title" style="color:#60a5fa;">
        <span class="section-num" style="background:#3b82f6;">2</span>
        基本資料與月份
      </div>
      <div class="basic-grid">
        <div class="form-field">
          <label class="form-label" for="unit">單位 <span class="required">*</span></label>
          <input class="form-input" id="unit" type="text" value="畜產加工組" oninput="updateProgress()">
        </div>
        <div class="form-field">
          <label class="form-label" for="place" id="place-label">作業場所 <span class="required">*</span></label>
          <input class="form-input" id="place" type="text" value="加工館" oninput="updateProgress()">
        </div>
        <div class="form-field">
          <label class="form-label" for="roc-year">檢查月份 <span class="required">*</span></label>
          <div class="date-row">
            <input class="date-input-sm" id="roc-year" type="text" maxlength="3" oninput="handleMonthInput()">
            <label>年</label>
            <input class="date-input-sm" id="month" type="text" maxlength="2" style="width:55px" oninput="handleMonthInput()">
            <label>月</label>
          </div>
        </div>
      </div>
      <div class="calendar-panel">
        <div class="calendar-head">
          <div class="calendar-title" id="calendar-title">月份行事曆</div>
          <div class="calendar-legend">
            <span><i class="legend-dot legend-selected"></i>巡檢日</span>
            <span><i class="legend-dot legend-locked"></i>週末 / 國定假日</span>
          </div>
        </div>
        <table class="month-calendar" aria-label="月份行事曆">
          <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
          <tbody id="calendar-body"></tbody>
        </table>
        <div class="selected-dates" id="selected-dates">尚未選擇巡檢日期</div>
      </div>
    </div>

    <div class="form-section compact-section">
      <div class="section-title" style="color:#60a5fa;">
        <span class="section-num" style="background:#3b82f6;">3</span>
        檢點項目
        <span style="font-size:12px; font-weight:400; color:var(--text-muted); margin-left:8px;">正常(ˇ)　需保養(Δ)　異常/改善(×)　無此項(–)</span>
      </div>
      <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
        <table class="inspect-table">
          <thead>
            <tr>
              <th class="part-col" id="part-heading">檢點部分</th>
              <th class="content-col">檢點內容 / 檢查方法</th>
              <th class="result-col">檢查結果</th>
            </tr>
          </thead>
          <tbody id="inspect-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="form-section compact-section">
      <div class="section-title" style="color:#60a5fa;">
        <span class="section-num" style="background:#3b82f6;">4</span>
        建議改善事項
      </div>
      <div class="form-field">
        <label class="form-label" for="improvement-summary">本月檢點建議改善事項</label>
        <textarea class="form-textarea improvement-box" id="improvement-summary" rows="4" placeholder="請彙整本月檢點需改善、保養或送修事項..." oninput="updateProgress()"></textarea>
      </div>
    </div>

    <div class="form-section compact-section">
      <div class="section-title" style="color:#60a5fa;">
        <span class="section-num" style="background:#3b82f6;">5</span>
        簽核
      </div>
      <div class="signature-grid" id="signature-grid"></div>
    </div>

    <div style="display:flex;gap:16px;justify-content:flex-end;margin-top:8px;">
      <button class="btn btn-ghost" onclick="clearForm()">清除表單</button>
      <button class="btn btn-print" onclick="printForm()">列印/匯出PDF檔</button>
      <button class="btn btn-primary" onclick="saveForm()">暫存</button>
    </div>
  </div>

  <div class="print-sheet" id="print-sheet"></div>

  <footer class="site-footer">

    function pad2(value) {

    function selectedYearMonth() {
      const rocYear = Number(document.getElementById('roc-year').value);
      const month = Number(document.getElementById('month').value);

      return { rocYear: year - 1911, year, month: month >= 1 && month <= 12 ? month : new Date().getMonth() + 1 };
    }

    function dateKey(year, month, day) {
      return `${year}-${pad2(month)}-${pad2(day)}`;
    }

    function holidayName(key) {
      return HOLIDAY_NAMES_2026[key] || '';
    }

    function isLockedDate(date, key) {
      const day = date.getDay();
      return day === 0 || day === 6 || Boolean(holidayName(key));
    }

    function resultBucketForDate(key, create = false) {
      if (!key) return null;
      if (!inspectionResultsByDate[key] && create) inspectionResultsByDate[key] = {};
      return inspectionResultsByDate[key] || null;
    }

    function selectedResult(idx, key = activeInspectionDate) {
      const bucket = resultBucketForDate(key);
      return bucket ? (bucket[idx] || '') : '';

    function pruneResultsToSelectedDates() {
      Object.keys(inspectionResultsByDate).forEach(key => {
        if (!selectedInspectionDates.has(key)) delete inspectionResultsByDate[key];

      if (!selectedInspectionDates.has(activeInspectionDate)) {
        activeInspectionDate = [...selectedInspectionDates].sort()[0] || '';

    function syncResultInputs() {

      currentForm().items.forEach((_, idx) => {
        const value = selectedResult(idx);

          input.disabled = !hasActiveDate;
          input.checked = hasActiveDate && input.value === value;

    function onResultChange(idx) {
      if (!activeInspectionDate) {
        syncResultInputs();
        return;

      const checked = document.querySelector(`[name="result-${idx}"]:checked`);
      const bucket = resultBucketForDate(activeInspectionDate, true);
      if (checked) bucket[idx] = checked.value;
      onFormChange();
    }

    function setDefaultNormalResults(key) {

    function renderCalendar() {
      const { rocYear, year, month } = selectedYearMonth();
      const body = document.getElementById('calendar-body');
      const title = document.getElementById('calendar-title');
      const first = new Date(year, month - 1, 1);
      const daysInMonth = new Date(year, month, 0).getDate();
      const startDay = first.getDay();
      const validPrefix = `${year}-${pad2(month)}-`;
      selectedInspectionDates = new Set([...selectedInspectionDates].filter(key => key.startsWith(validPrefix)));
      pruneResultsToSelectedDates();

      title.textContent = `民國 ${rocYear} 年 ${month} 月行事曆`;
      let html = '';
      let day = 1;
      for (let week = 0; week < 6; week++) {
        html += '<tr>';
        for (let dow = 0; dow < 7; dow++) {
          if ((week === 0 && dow < startDay) || day > daysInMonth) {
            html += '<td><button type="button" class="calendar-day blank" tabindex="-1" disabled></button></td>';
            continue;
          }
          const key = dateKey(year, month, day);
          const date = new Date(year, month - 1, day);
          const locked = isLockedDate(date, key);
          const selected = selectedInspectionDates.has(key);
          const active = activeInspectionDate === key;
          const note = locked ? (holidayName(key) || '週末') : '工作日';
          html += `<td>
            <button type="button" class="calendar-day ${locked ? 'locked' : ''} ${selected ? 'selected' : ''} ${active ? 'active' : ''}" data-date="${key}" ${locked ? 'disabled' : ''} onclick="toggleInspectionDate('${key}')">
              <span class="day-num">${day}</span>
              <span class="day-note">${escapeHtml(note)}</span>
            </button>
          </td>`;
          day++;
        }
        html += '</tr>';
        if (day > daysInMonth) break;
      }
      body.innerHTML = html;
      renderSelectedDates();
      syncResultInputs();
      buildPrintSheet();
    }

    function resizeCanvas(canvas, keepImage = true) {
      const oldImage = keepImage ? canvas.toDataURL('image/png') : '';
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.round(rect.width * ratio));
      canvas.height = Math.max(1, Math.round(rect.height * ratio));
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 2.4;
      ctx.strokeStyle = '#111827';
      if (oldImage && oldImage.length > 100) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = oldImage;
      }
    }

    function setupSignaturePads() {
      signaturePads.clear();
      document.querySelectorAll('.signature-pad').forEach(canvas => {
        resizeCanvas(canvas, false);
        const ctx = canvas.getContext('2d');
        const state = { drawing: false, dirty: false, lastX: 0, lastY: 0 };
        signaturePads.set(canvas.id, state);

        const point = event => {
          const rect = canvas.getBoundingClientRect();
          return { x: event.clientX - rect.left, y: event.clientY - rect.top };
        };
        const start = event => {
          event.preventDefault();
          canvas.setPointerCapture(event.pointerId);
          const p = point(event);
          state.drawing = true;
          state.dirty = true;
          state.lastX = p.x;
          state.lastY = p.y;
        };
        const move = event => {
          if (!state.drawing) return;
          event.preventDefault();
          const p = point(event);
          ctx.beginPath();
          ctx.moveTo(state.lastX, state.lastY);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
          state.lastX = p.x;
          state.lastY = p.y;
          onFormChange();
        };
        const stop = event => {
          if (!state.drawing) return;
          event.preventDefault();
          state.drawing = false;
          onFormChange();
        };
        canvas.addEventListener('pointerdown', start);
        canvas.addEventListener('pointermove', move);
        canvas.addEventListener('pointerup', stop);
        canvas.addEventListener('pointercancel', stop);
        canvas.addEventListener('pointerleave', stop);
      });
    }

    function clearSignature(idx) {
      const canvas = document.getElementById(`signature-${idx}`);
      if (!canvas) return;
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      const state = signaturePads.get(canvas.id);
      if (state) state.dirty = false;
      onFormChange();
    }

    function clearAllSignatures() {

    function resultDateKeyForPeriod(period, isMonthly) {
      const { year, month } = selectedYearMonth();
      if (!isMonthly) return dateKey(year, month, period);
      const prefix = `${year}-${pad2(period)}-`;
      if (activeInspectionDate.startsWith(prefix)) return activeInspectionDate;
      return [...selectedInspectionDates].sort().find(key => key.startsWith(prefix)) || '';
    }

    function buildPrintSheet() {
      const sheet = document.getElementById('print-sheet');
      if (!sheet) return;
      const form = currentForm();
      sheet.className = `print-sheet print-${form.id}`;
      const { rocYear, month } = selectedYearMonth();
      const selectedDays = selectedDaySet();
      const improvement = document.getElementById('improvement-summary')?.value || '';
      const isMonthly = form.id === 'monthly-workplace';
      const periodCount = isMonthly ? 12 : 31;
      const selectedPeriods = isMonthly ? new Set([month]) : selectedDays;
      const dayHeaders = Array.from({ length: periodCount }, (_, i) => `<th class="print-day"><span class="print-num">${i + 1}</span></th>`).join('');
      const contentHeading = form.id === 'electric-cart'
        ? '檢查方法'
        : (form.id === 'protective-equipment' ? '檢點內容' : '檢點內容 / 檢查方法');
      const noteLabels = ['一、', '二、', '三、'];
      const noteLines = printInstructions(form).map((line, idx) => `<li>${noteLabels[idx] || ''}${printText(line)}</li>`).join('');
      const metaValue = document.getElementById('place').value;
      const middleMeta = form.id === 'electric-cart'
        ? `${printText(form.metaLabel)}：${printPlateValue(metaValue)}`
        : `${printText(form.metaLabel)}：${printText(metaValue)}`;
      const tableHead = `
        <thead>
          <tr>
            <th class="print-part">${printText(form.partHeading || '檢點部分')}</th>
            <th class="print-content">${printText(contentHeading)}</th>
            ${dayHeaders}
          </tr>
        </thead>`;
      const renderRows = (items, startIdx = 0) => {
        const partSpans = items.map((item, idx, sectionItems) => {
          if (idx > 0 && item[0] === sectionItems[idx - 1][0]) return 0;
          let count = 1;
          while (idx + count < sectionItems.length && sectionItems[idx + count][0] === item[0]) count++;
          return count;
        });
        return items.map((item, idx) => {
          const itemIndex = startIdx + idx;
          const marks = Array.from({ length: periodCount }, (_, i) => {
            const period = i + 1;
            const resultKey = resultDateKeyForPeriod(period, isMonthly);
            const mark = selectedPeriods.has(period) ? (RESULT_MARKS[selectedResult(itemIndex, resultKey)] || '') : '';
            return `<td class="print-mark">${mark}</td>`;
          }).join('');
          const trimOtherColonForms = new Set(['electric-cart', 'protective-equipment', 'electric-machinery', 'monthly-workplace']);
          let partText = trimOtherColonForms.has(form.id) ? item[0].replace(/：$/, '') : item[0];
          if (form.id === 'protective-equipment') partText = partText.replace(/／/g, '/');
          if (form.id === 'protective-equipment' && partText === '防護眼鏡及面具') partText = '防護眼鏡<br>及面具';
          if (form.id === 'electric-machinery' && partText === '電器安全') partText = '電氣安全';
          let contentText = ((form.id === 'protective-equipment' || form.id === 'electric-machinery') && item[0].replace(/：$/, '') === '其他') ? '' : item[1];
          const spanAttr = partSpans[idx] > 1 ? ` rowspan="${partSpans[idx]}"` : '';
          const partCell = partSpans[idx] > 0 ? `<td class="print-part"${spanAttr}>${printTextWithBreaks(partText)}</td>` : '';
          return `<tr>
            ${partCell}
            <td class="print-content"><span class="print-content-inner">${printTextWithBreaks(contentText)}</span></td>
            ${marks}
          </tr>`;
        }).join('');
      };
      const rows = renderRows(form.items);
      const electricMachineryTables = () => {
        const splitIndex = 12;
        const firstRows = renderRows(form.items.slice(0, splitIndex), 0);
        const secondRows = renderRows(form.items.slice(splitIndex), splitIndex);
        return `
          <table class="print-table">
            ${tableHead}
            <tbody>${firstRows}</tbody>
          </table>
          <table class="print-table print-table-continued">
            ${tableHead}
            <tbody>
              ${secondRows}
              <tr class="print-improve-row">
                <td class="print-improve-cell" colspan="${periodCount + 2}"><span class="print-improve-title">建議改善事項：</span>${printText(improvement)}</td>
              </tr>
              <tr>
                <td class="print-note" colspan="${periodCount + 2}">
                  <div class="print-note-title">說明：</div>
                  <ol class="print-note-lines">${noteLines}</ol>
                </td>
              </tr>
            </tbody>
          </table>`;
      };
      const printTable = form.id === 'electric-machinery' ? electricMachineryTables() : `
        <table class="print-table">
          ${tableHead}
          <tbody>
            ${rows}
            <tr class="print-improve-row">
              <td class="print-improve-cell" colspan="${periodCount + 2}"><span class="print-improve-title">建議改善事項：</span>${printText(improvement)}</td>
            </tr>
            <tr>
              <td class="print-note" colspan="${periodCount + 2}">
                <div class="print-note-title">說明：</div>
                <ol class="print-note-lines">${noteLines}</ol>
              </td>
            </tr>
          </tbody>
        </table>`;
      const signatures = SIGNERS.map((label, idx) => {
        const canvas = document.getElementById(`signature-${idx}`);
        const state = canvas ? signaturePads.get(canvas.id) : null;
        const image = canvas && state && state.dirty ? `<img src="${canvas.toDataURL('image/png')}" alt="${escapeHtml(label)}簽名">` : '';
        return `<div class="print-sign-box"><div class="print-sign-title">${printText(label)}</div><div class="print-sign-body">${image}</div></div>`;
      }).join('');
      sheet.innerHTML = `
        <div class="print-retention">保存年限：<span class="print-num">3</span>年</div>
        <div class="print-title-org">農業部畜產試驗所</div>
        <div class="print-title-main">${printText(form.printTitle)}</div>
        <div class="print-meta">
          <div>單位：${printText(document.getElementById('unit').value)}</div>
          <div>${middleMeta}</div>
          <div>檢查日期：<span class="print-num">${rocYear}</span> 年 <span class="print-num">${month}</span> 月</div>
        </div>
        ${printTable}
        <div class="print-signatures">${signatures}</div>
      `;
    }

    function printForm() {
      buildPrintSheet();
      window.print();
    }

    function onFormChange() {
      updateProgress();
      buildPrintSheet();
    }

    function updateProgress() {
      const totalItems = currentForm().items.length;
      const inputs = document.querySelectorAll('.form-input, .form-textarea, .date-input-sm');
      let filled = 0;
      inputs.forEach(input => { if (input.value.trim()) filled++; });
      [...selectedInspectionDates].forEach(key => {
        for (let i = 0; i < totalItems; i++) {
          if (selectedResult(i, key)) filled++;
        }
      });
      signaturePads.forEach(state => { if (state.dirty) filled++; });
      if (selectedInspectionDates.size > 0) filled++;
      const resultTotal = Math.max(1, selectedInspectionDates.size) * totalItems;
      const total = inputs.length + resultTotal + signaturePads.size + 1;
      const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
      document.getElementById('progress-fill').style.width = Math.min(100, pct) + '%';
    }

    function collectData() {
      pruneResultsToSelectedDates();
      const data = {
        typeId: currentTypeId,
        signatures: {},
        selectedDates: [...selectedInspectionDates].sort(),
        activeDate: activeInspectionDate,
        resultsByDate: JSON.parse(JSON.stringify(inspectionResultsByDate))
      };
      document.querySelectorAll('.form-input, .form-textarea, .date-input-sm').forEach(el => { data[el.id] = el.value; });
      document.querySelectorAll('.signature-pad').forEach(canvas => {
        const state = signaturePads.get(canvas.id);
        data.signatures[canvas.id] = state && state.dirty ? canvas.toDataURL('image/png') : '';
      });
      return data;
    }

    function makeDraftTitle() {
      const form = currentForm();
      const unit = document.getElementById('unit').value.trim();
      const place = document.getElementById('place').value.trim();
      const { rocYear, month } = selectedYearMonth();
      return [form.title, unit, place, `${rocYear}年${month}月`].filter(Boolean).join(' / ');
    }

    function saveForm() {
      const now = new Date().toISOString();
      if (!currentDraftId) {
        currentDraftId = 'inspection-' + Date.now();
        const url = new URL(window.location.href);
        url.searchParams.set('draft', currentDraftId);
        window.history.replaceState({}, '', url);
      }

      const record = {
        id: currentDraftId,
        type: 'inspection',
        typeLabel: '作業巡檢表',
        title: makeDraftTitle(),
        url: 'inspection-form.html?draft=' + encodeURIComponent(currentDraftId),
        createdAt: now,
        updatedAt: now,
        data: collectData()
      };

      const existingRaw = localStorage.getItem(DRAFT_RECORD_PREFIX + currentDraftId);
      if (existingRaw) {
        try {
          const existing = JSON.parse(existingRaw);
          record.createdAt = existing.createdAt || now;
        } catch (e) {}
      }

      localStorage.setItem(DRAFT_RECORD_PREFIX + currentDraftId, JSON.stringify(record));
      const index = getDraftIndex().filter(item => item.id !== currentDraftId);
      index.push({
        id: record.id,
        type: record.type,
        typeLabel: record.typeLabel,
        title: record.title,
        url: record.url,
        createdAt: record.createdAt,
        updatedAt: record.updatedAt
      });
      setDraftIndex(index);
      const backLink = document.querySelector('.back-btn');
      if (backLink) backLink.href = 'index.html?drafts=' + encodeURIComponent(currentDraftId) + '&t=' + Date.now();
      showToast('作業巡檢表已暫存，可回首頁清冊繼續修改');
    }

    function loadForm() {
      if (!currentDraftId) return;
      const recordRaw = localStorage.getItem(DRAFT_RECORD_PREFIX + currentDraftId);
      if (!recordRaw) return;
      let data = {};
      try {
        const record = JSON.parse(recordRaw);
        data = record.data || {};
      } catch (e) {
        return;
      }
      const legacyResults = {};
      Object.entries(data).forEach(([id, value]) => {
        if (id === 'typeId' || id === 'signatures' || id === 'selectedDates' || id === 'activeDate' || id === 'resultsByDate') return;
        if (id.startsWith('result-')) {
          legacyResults[id.replace('result-', '')] = value;
          return;
        }
        const el = document.getElementById(id);
        if (el) el.value = value;
      });
      if (currentForm().id === 'electric-cart' && document.getElementById('place').value === '加工館') {
        document.getElementById('place').value = 'QAS-3381';
      }
      selectedInspectionDates = new Set(Array.isArray(data.selectedDates) ? data.selectedDates : []);
      inspectionResultsByDate = data.resultsByDate && typeof data.resultsByDate === 'object' ? data.resultsByDate : {};
      if (!Object.keys(inspectionResultsByDate).length && Object.keys(legacyResults).length && selectedInspectionDates.size) {
        inspectionResultsByDate[[...selectedInspectionDates].sort()[0]] = legacyResults;
      }
      activeInspectionDate = selectedInspectionDates.has(data.activeDate) ? data.activeDate : ([...selectedInspectionDates].sort()[0] || '');
      renderCalendar();
      clearAllSignatures();
      if (data.signatures) {
        Object.entries(data.signatures).forEach(([id, image]) => {
          if (!image) return;
          const canvas = document.getElementById(id);
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          const img = new Image();
          img.onload = () => {
            const rect = canvas.getBoundingClientRect();
            ctx.drawImage(img, 0, 0, rect.width, rect.height);
            const state = signaturePads.get(id);
            if (state) state.dirty = true;
            updateProgress();
            buildPrintSheet();
          };
          img.src = image;
        });
      }
      buildPrintSheet();
    }

    function clearForm() {
      if (!confirm('確定要清除目前表單內容嗎？')) return;
      document.querySelectorAll('.form-input, .form-textarea, .date-input-sm').forEach(el => el.value = '');
      document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
      clearAllSignatures();
      selectedInspectionDates = new Set();
      activeInspectionDate = '';
      inspectionResultsByDate = {};
      localStorage.removeItem(storageKey());
      document.getElementById('unit').value = '畜產加工組';
      setDefaultDate();
      renderInspectTable();
      renderCalendar();
      updateProgress();
      buildPrintSheet();
      showToast('表單已清除');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      Object.assign(toast.style, {
        position: 'fixed', bottom: '32px', right: '32px',
        background: 'rgba(10,20,40,0.95)', border: '1px solid rgba(59,130,246,0.5)',
        color: '#e8f5ee', padding: '14px 24px', borderRadius: '12px',
        fontSize: '14px', fontWeight: '600', zIndex: '9999',
        boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
        animation: 'fadeIn .3s ease', backdropFilter: 'blur(20px)'
      });
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = '.4s'; setTimeout(() => toast.remove(), 400); }, 2600);
    }

    function setDefaultDate() {
      const now = new Date();
      if (!document.getElementById('roc-year').value) document.getElementById('roc-year').value = now.getFullYear() - 1911;
      if (!document.getElementById('month').value) document.getElementById('month').value = now.getMonth() + 1;
    }

    window.addEventListener('resize', () => {
      document.querySelectorAll('.signature-pad').forEach(canvas => resizeCanvas(canvas));
      buildPrintSheet();
    });

    window.addEventListener('beforeprint', buildPrintSheet);

    document.addEventListener('DOMContentLoaded', () => {
      const draftData = readCurrentDraftData();
      if (draftData?.typeId && FORM_TYPES.some(item => item.id === draftData.typeId)) currentTypeId = draftData.typeId;
      renderTypeCards();
      renderInspectTable();
      renderSignaturePads();
      setDefaultDate();
      renderCalendar();
      loadForm();
      updateProgress();
      buildPrintSheet();
    });

    window.addEventListener('beforeunload', () => {
      localStorage.setItem('inspection-form-current-type', currentTypeId);
    });
  </script>
</body>
</html>
